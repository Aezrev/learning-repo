<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Travel Recommendation</title>
  <link rel="stylesheet" href="./travel_recommendation.css">
</head>
<body>
  <nav><h1>Travel Recommendation</h1>
    <ul>
      <li><a href="./index.html" id="home">Home </a></li>
      <li><a href="./travel_about.html" id="about">About Us </a></li>
      <li><a href="./travel_contact.html" id="contact">Contact Us </a></li>

    </ul>
    </nav>
  <h1 id="cover">Contact us</h1>
  <p id="cover-text">Feel free to contact us to know more about your vacation plans.</p>
     <form id="contactForm">
    <div>
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>
    </div>
    <div>
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div>
      <label for="condition">Condition</label>
      <input type="text" id="condition" name="condition" required>
    </div>
    <div>
      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" required></textarea>
    </div>
    <button type="submit" onclick="thankyou()">Submit</button>
  </form>
  
</body>
</html>
